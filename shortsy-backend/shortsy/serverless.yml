org: thevisionariesclub
app: shortsy
service: shortsy

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-south-1'}
  stage: ${opt:stage, 'dev'}

  environment:
    STAGE:                ${self:provider.stage}
    REGION:               ${self:provider.region}
    CONTENT_TABLE:        ${self:service}-content-${self:provider.stage}
    RENTALS_TABLE:        ${self:service}-rentals-${self:provider.stage}
    PROGRESS_TABLE:       ${self:service}-progress-${self:provider.stage}
    ORDERS_TABLE:         ${self:service}-orders-${self:provider.stage}
    PREMIUMS_TABLE:       ${self:service}-premiums-${self:provider.stage}
    USER_POOL_ID:         !Ref CognitoUserPool
    USER_POOL_CLIENT_ID:  !Ref CognitoUserPoolClient
    CDN_BASE:             ${env:CDN_BASE, 'https://cdn.shortsy.app'}
    S3_MEDIA_BUCKET:      ${self:service}-media-${self:provider.stage}
    RAZORPAY_KEY_ID:      ${env:RAZORPAY_KEY_ID, 'rzp_test_SLajOeA4k89FaD'}
    RAZORPAY_KEY_SECRET:  ${env:RAZORPAY_KEY_SECRET, 'KFg2xasu5pQ8P8qWphrruzAb'}
    STREAM_EXPIRY_SECONDS: '3600'

  httpApi:
    cors: true
    authorizers:
      cognitoJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}'
        audience:
          - !Ref CognitoUserPoolClient

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt ContentTable.Arn
            - !Sub '${ContentTable.Arn}/index/*'
            - !GetAtt RentalsTable.Arn
            - !Sub '${RentalsTable.Arn}/index/*'
            - !GetAtt ProgressTable.Arn
            - !GetAtt OrdersTable.Arn
            - !Sub '${OrdersTable.Arn}/index/*'
            - !GetAtt PremiumsTable.Arn
            - !Sub '${PremiumsTable.Arn}/index/*'
        - Effect: Allow
          Action:
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminUpdateUserAttributes
            - cognito-idp:AdminDeleteUser
            - cognito-idp:AdminConfirmSignUp
            - cognito-idp:InitiateAuth
          Resource: !GetAtt CognitoUserPool.Arn
        - Effect: Allow
          Action:
            - s3:GetObject
          Resource: !Sub 'arn:aws:s3:::${self:provider.environment.S3_MEDIA_BUCKET}/*'

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    concurrency: 10
    packager: npm
    external:
      - '@aws-sdk/client-dynamodb'
      - '@aws-sdk/lib-dynamodb'
      - '@aws-sdk/client-cognito-identity-provider'
      - '@aws-sdk/client-s3'
      - '@aws-sdk/s3-request-presigner'

# ── Functions ─────────────────────────────────────────────────────────────────
functions:
  orderCreate:
    handler: src/handlers/order.createOrder
    events:
      - httpApi:
          path: /v1/order
          method: POST

  orderPaymentHistory:
    handler: src/handlers/order.getPaymentHistory
    events:
      - httpApi:
          path: /v1/order/history
          method: GET
          authorizer: { name: cognitoJwt }

  contentAdd:
    handler: src/handlers/content.add
    events:
      - httpApi:
          path: /v1/content
          method: POST
          authorizer: { name: cognitoJwt }

  # ── Auth (public — no authorizer) ─────────────────────────────────────────
  authSignup:
    handler: src/handlers/auth.signup
    events:
      - httpApi: { path: /v1/auth/signup,          method: POST }

  authLogin:
    handler: src/handlers/auth.login
    events:
      - httpApi: { path: /v1/auth/login,           method: POST }

  authForgotPassword:
    handler: src/handlers/auth.forgotPassword
    events:
      - httpApi: { path: /v1/auth/forgot-password, method: POST }

  authRefresh:
    handler: src/handlers/auth.refreshToken
    events:
      - httpApi: { path: /v1/auth/refresh,         method: POST }

  authLogout:
    handler: src/handlers/auth.logout
    events:
      - httpApi:
          path: /v1/auth/logout
          method: POST
          authorizer: { name: cognitoJwt }

  # ── Content (protected) ────────────────────────────────────────────────────
  contentList:
    handler: src/handlers/content.list
    events:
      - httpApi:
          path: /v1/content
          method: GET
          authorizer: { name: cognitoJwt }

  contentFeatured:
    handler: src/handlers/content.featured
    events:
      - httpApi:
          path: /v1/content/featured
          method: GET
          authorizer: { name: cognitoJwt }

  contentMetadata:
    handler: src/handlers/content.metadata
    events:
      - httpApi:
          path: /v1/content/metadata
          method: GET
          authorizer: { name: cognitoJwt }

  contentSearch:
    handler: src/handlers/content.search
    events:
      - httpApi:
          path: /v1/content/search
          method: GET
          authorizer: { name: cognitoJwt }

  contentGetById:
    handler: src/handlers/content.getById
    events:
      - httpApi:
          path: /v1/content/{id}
          method: GET
          authorizer: { name: cognitoJwt }

  # ── Rentals (protected) ────────────────────────────────────────────────────
  rentalInitiate:
    handler: src/handlers/rentals.initiate
    events:
      - httpApi:
          path: /v1/rentals/initiate
          method: POST
          authorizer: { name: cognitoJwt }

  rentalConfirm:
    handler: src/handlers/rentals.confirm
    events:
      - httpApi:
          path: /v1/rentals/confirm
          method: POST
          authorizer: { name: cognitoJwt }

  rentalsList:
    handler: src/handlers/rentals.list
    events:
      - httpApi:
          path: /v1/rentals
          method: GET
          authorizer: { name: cognitoJwt }

  rentalGetStatus:
    handler: src/handlers/rentals.getStatus
    events:
      - httpApi:
          path: /v1/rentals/{contentId}
          method: GET
          authorizer: { name: cognitoJwt }

  rentalAddPremium:
    handler: src/handlers/rentals.addPremiumRental
    events:
      - httpApi:
          path: /v1/rentals/premium
          method: POST
          authorizer: { name: cognitoJwt }

  # ── Playback (protected) ───────────────────────────────────────────────────
  streamFilm:
    handler: src/handlers/playback.streamFilm
    events:
      - httpApi:
          path: /v1/content/{id}/stream
          method: GET
          authorizer: { name: cognitoJwt }

  streamEpisode:
    handler: src/handlers/playback.streamEpisode
    events:
      - httpApi:
          path: /v1/content/{id}/episodes/{episodeId}/stream
          method: GET
          authorizer: { name: cognitoJwt }

  progressSave:
    handler: src/handlers/playback.saveProgress
    events:
      - httpApi:
          path: /v1/content/{id}/progress
          method: POST
          authorizer: { name: cognitoJwt }

  progressGet:
    handler: src/handlers/playback.getProgress
    events:
      - httpApi:
          path: /v1/content/{id}/progress
          method: GET
          authorizer: { name: cognitoJwt }

  # ── Users (protected) ─────────────────────────────────────────────────────
  userGetMe:
    handler: src/handlers/users.getMe
    events:
      - httpApi:
          path: /v1/users/me
          method: GET
          authorizer: { name: cognitoJwt }

  userUpdateMe:
    handler: src/handlers/users.updateMe
    events:
      - httpApi:
          path: /v1/users/me
          method: PATCH
          authorizer: { name: cognitoJwt }

  userDeleteMe:
    handler: src/handlers/users.deleteMe
    events:
      - httpApi:
          path: /v1/users/me
          method: DELETE
          authorizer: { name: cognitoJwt }

  # ── Premium (protected) ────────────────────────────────────────────────────
  premiumInitiate:
    handler: src/handlers/premium.initiate
    events:
      - httpApi:
          path: /v1/premium/initiate
          method: POST
          authorizer: { name: cognitoJwt }

  premiumConfirm:
    handler: src/handlers/premium.confirm
    events:
      - httpApi:
          path: /v1/premium/confirm
          method: POST
          authorizer: { name: cognitoJwt }

  premiumStatus:
    handler: src/handlers/premium.status
    events:
      - httpApi:
          path: /v1/premium/status
          method: GET
          authorizer: { name: cognitoJwt }

# ── AWS Resources (CloudFormation) ────────────────────────────────────────────
resources:
  Resources:

    # ── Cognito ──────────────────────────────────────────────────────────────
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-users-${self:provider.stage}
        AutoVerifiedAttributes: [email]
        UsernameAttributes: [email]
        AdminCreateUserConfig:
          AllowAdminCreateUserOnly: false
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireUppercase: true
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
        Schema:
          - { Name: email, AttributeDataType: String, Required: true,  Mutable: true }
          - { Name: name,  AttributeDataType: String, Required: false, Mutable: true }

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-app-${self:provider.stage}
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_SRP_AUTH
        AccessTokenValidity: 15
        IdTokenValidity: 15
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: minutes
          IdToken: minutes
          RefreshToken: days
        PreventUserExistenceErrors: ENABLED

    # ── DynamoDB ──────────────────────────────────────────────────────────────
    ContentTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CONTENT_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - { AttributeName: id,          AttributeType: S }
          - { AttributeName: type,        AttributeType: S }
          - { AttributeName: genre,       AttributeType: S }
          - { AttributeName: featuredKey, AttributeType: S }
        KeySchema:
          - { AttributeName: id, KeyType: HASH }
        GlobalSecondaryIndexes:
          - IndexName: type-index
            KeySchema: [{ AttributeName: type,        KeyType: HASH }]
            Projection: { ProjectionType: ALL }
          - IndexName: genre-index
            KeySchema: [{ AttributeName: genre,       KeyType: HASH }]
            Projection: { ProjectionType: ALL }
          - IndexName: featured-index
            KeySchema: [{ AttributeName: featuredKey, KeyType: HASH }]
            Projection: { ProjectionType: ALL }

    RentalsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.RENTALS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - { AttributeName: userId,    AttributeType: S }
          - { AttributeName: contentId, AttributeType: S }
        KeySchema:
          - { AttributeName: userId,    KeyType: HASH }
          - { AttributeName: contentId, KeyType: RANGE }
        GlobalSecondaryIndexes:
          - IndexName: contentId-index
            KeySchema: [{ AttributeName: contentId, KeyType: HASH }]
            Projection: { ProjectionType: ALL }

    ProgressTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PROGRESS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - { AttributeName: userId,    AttributeType: S }
          - { AttributeName: contentId, AttributeType: S }
        KeySchema:
          - { AttributeName: userId,    KeyType: HASH }
          - { AttributeName: contentId, KeyType: RANGE }

    OrdersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.ORDERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - { AttributeName: orderId, AttributeType: S }
          - { AttributeName: userId,  AttributeType: S }
        KeySchema:
          - { AttributeName: orderId, KeyType: HASH }
        GlobalSecondaryIndexes:
          - IndexName: userId-index
            KeySchema: [{ AttributeName: userId, KeyType: HASH }]
            Projection: { ProjectionType: ALL }
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    PremiumsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PREMIUMS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - { AttributeName: userId,  AttributeType: S }
          - { AttributeName: subscriptionId, AttributeType: S }
          - { AttributeName: orderId, AttributeType: S }
        KeySchema:
          - { AttributeName: userId, KeyType: HASH }
          - { AttributeName: subscriptionId, KeyType: RANGE }
        GlobalSecondaryIndexes:
          - IndexName: OrderIdIndex
            KeySchema: [{ AttributeName: orderId, KeyType: HASH }]
            Projection: { ProjectionType: ALL }
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

  Outputs:
    UserPoolId:
      Value: !Ref CognitoUserPool
      Export: { Name: '${self:service}-${self:provider.stage}-UserPoolId' }
    UserPoolClientId:
      Value: !Ref CognitoUserPoolClient
      Export: { Name: '${self:service}-${self:provider.stage}-UserPoolClientId' }
    ApiEndpoint:
      Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
      Export: { Name: '${self:service}-${self:provider.stage}-ApiEndpoint' }
